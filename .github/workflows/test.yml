name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Build distributions
        run: python -m build

      - name: Smoke test installed CLI
        run: |
          viz --version
          viz capabilities --format json > /tmp/viz-capabilities.json
